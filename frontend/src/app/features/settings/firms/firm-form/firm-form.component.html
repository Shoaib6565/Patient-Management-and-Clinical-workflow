<div>

  <h3 class="text-lg font-bold mb-4">
    {{ isEdit ? 'Edit Firm' : 'Create Firm' }}
  </h3>

  <div class="grid grid-cols-2 gap-3">

    <input class="input input-bordered"
      placeholder="Firm Name"
      [(ngModel)]="form.firm_name">

    <select class="select select-bordered"
      [(ngModel)]="form.firm_type">
      <option *ngFor="let t of firmTypes" [value]="t">
        {{ t }}
      </option>
    </select>

    <input class="input input-bordered col-span-2"
      placeholder="Address"
      [(ngModel)]="form.address">

    <input class="input input-bordered"
      placeholder="Phone"
      [(ngModel)]="form.phone">

    <input class="input input-bordered"
      placeholder="Contact Person"
      [(ngModel)]="form.contact_person">

  </div>

  <div class="flex justify-end gap-2 mt-4">
    <button class="btn" (click)="back()">Back</button>
    <button class="btn btn-primary" (click)="save()"
      [disabled]="!canCreateAndUpdate()">
      <i class="ti ti-check"></i>
      Save
    </button>
  </div>

</div>
