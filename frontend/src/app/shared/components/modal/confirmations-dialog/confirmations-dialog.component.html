<div class="overlay" *ngIf="visible">

  <div class="dialog">

    <h3>{{title}}</h3>
    <p>{{message}}</p>

    <div class="buttons">
      <button class="cancel" (click)="cancel()">Cancel</button>
      <button class="confirm" (click)="confirm()">{{ buttonName}}</button>
    </div>

  </div>

</div>
