<nav class="navbar-wrapper">

  <!-- LEFT: hamburger + logo -->
  <div class="nav-left">

    <button class="icon-btn hamburger" (click)="onToggle()" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18"
        height="18">
        <line x1="4" y1="7" x2="20" y2="7" />
        <line x1="4" y1="12" x2="20" y2="12" />
        <line x1="4" y1="17" x2="20" y2="17" />
      </svg>
    </button>

    <div class="logo">
      <div class="logo-mark">+</div>
      <div class="logo-text-wrap">
        <span class="logo-title">MedTrack</span>
        <span class="logo-sub">Patient Management</span>
      </div>
    </div>

  </div>

  <!-- RIGHT: bell + user dropdown -->
  <div class="nav-right">

    <!-- Notification bell -->
    <button class="icon-btn notif-btn" aria-label="Notifications">
      <span class="notif-dot"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round" width="18" height="18">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
    </button>

    <div class="divider-v"></div>


    <!-- User dropdown -->
    <div class="user-dropdown-wrap" (clickOutside)="closeDropdown()">

      <div class="user-trigger" (click)="toggleDropdown()">
        <img [src]="user.avatar" class="user-avatar" alt="User avatar" />
        <div class="user-info">
          <span class="user-name">{{ user.name }}</span>
          <span class="user-role-label">{{ user.roleLabel }}</span>
        </div>
      </div>

      <div class="dropdown-menu" [class.open]="isDropdownOpen">

        <div class="dropdown-user-header">
          <img [src]="user.avatar" class="user-avatar" alt="" />
          <div>
            <span class="user-name">{{ user.name }}</span>
            <span [class]="badgeClass">{{ user.roleLabel }}</span>
          </div>
        </div>

        <div class="menu-divider"></div>

        <button class="menu-item menu-item-danger" (click)="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" width="15" height="15">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Logout
        </button>

      </div>

    </div>

  </div>
</nav>
